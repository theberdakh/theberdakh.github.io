name: Generate CV PDF

on:
  push:
    branches: [master, main]
    paths:
      - resume.html
      - assets/css/style.css

jobs:
  pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby and build Jekyll site
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build

      - name: Generate PDF with Chrome
        run: |
          google-chrome \
            --headless \
            --disable-gpu \
            --no-pdf-header-footer \
            --print-to-pdf="${{ github.workspace }}/assets/Berdakh_Tlepov_CV.pdf" \
            "file://${{ github.workspace }}/_site/cv/index.html"

      - name: Commit updated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/Berdakh_Tlepov_CV.pdf
          git diff --staged --quiet || git commit -m "chore: regenerate CV PDF"
          git push
