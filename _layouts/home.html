---
layout: default
---

<ul class="post-list">
  {% assign posts = paginator.posts | default: site.posts %}
  {% for post in posts %}
    <li class="post-item">
      <a href="{{ post.url | prepend: site.baseurl }}">
        <h2>{{ post.title }}</h2>
      </a>
      <div class="post-meta">{{ post.date | date: "%d %B %Y" }}</div>
      {% if post.excerpt %}
        <p class="post-excerpt">{{ post.excerpt | strip_html }}</p>
      {% endif %}
    </li>
  {% endfor %}
</ul>
